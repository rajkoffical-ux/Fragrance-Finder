<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScentMatch</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0d0d12;
    color: white;
}

.header {
    text-align: center;
    padding: 40px 20px;
}

h1 {
    font-size: 3rem;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

select, button, input {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
}

select, input {
    background: #1a1a22;
    color: white;
}

button {
    background: linear-gradient(135deg, #00f0ff, #ff00aa);
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #16161f;
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
}

.section-title {
    margin-top: 40px;
    color: #00f0ff;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="header">
<h1>ScentMatch 💨</h1>
<p>Find your perfect cologne</p>
</div>

<div class="container">

<input type="text" id="search" placeholder="Search cologne..." oninput="searchCologne()">

<select id="occasion">
<option value="">Occasion</option>
<option value="school">School</option>
<option value="gym">Gym</option>
<option value="date">Date</option>
</select>

<select id="budget">
<option value="">Budget</option>
<option value="cheap">Under $50</option>
<option value="mid">$50–$100</option>
<option value="high">$100+</option>
</select>

<select id="vibe">
<option value="">Vibe</option>
<option value="Fresh">Fresh</option>
<option value="Sweet">Sweet</option>
<option value="Dark">Dark</option>
<option value="Clean">Clean</option>
<option value="Warm">Warm</option>
</select>

<button onclick="findCologne()">Find My Scent</button>

<div id="result"></div>

<div class="section-title">🔥 Top Rated</div>
<div id="top"></div>

<div class="section-title">🕒 History</div>
<div id="history"></div>

</div>

<script>
const data = [
{name:"Dior Sauvage",occasion:"school",budget:"high",vibe:"Fresh 🌊",rating:4.7,why:"Mass appealing",dupe:"Ventana"},
{name:"Versace Eros",occasion:"date",budget:"mid",vibe:"Sweet 🔥",rating:4.6,why:"Attention grabbing",dupe:"Cuba Gold"},
{name:"Nautica Voyage",occasion:"gym",budget:"cheap",vibe:"Fresh 💧",rating:4.3,why:"Great daily",dupe:"Cool Water"},
{name:"Afnan 9PM",occasion:"date",budget:"cheap",vibe:"Sweet 🍬",rating:4.5,why:"Compliment magnet",dupe:"Ultra Male"},
{name:"Bleu de Chanel",occasion:"school",budget:"high",vibe:"Clean 🧥",rating:4.8,why:"Very versatile",dupe:"Armaf Blue"},
{name:"Montblanc Explorer",occasion:"school",budget:"mid",vibe:"Clean 🌍",rating:4.4,why:"Safe option",dupe:"Aventus"},
{name:"Club de Nuit Intense",occasion:"date",budget:"cheap",vibe:"Dark 🌑",rating:4.6,why:"Strong scent",dupe:"Aventus"},
{name:"Invictus",occasion:"gym",budget:"mid",vibe:"Fresh 🏃",rating:4.5,why:"Sporty",dupe:"Hawas"},
{name:"Spicebomb Extreme",occasion:"date",budget:"high",vibe:"Warm 🔥",rating:4.8,why:"Winter beast",dupe:"Cremo Spice"},
{name:"YSL Y EDP",occasion:"school",budget:"high",vibe:"Fresh ⚡",rating:4.7,why:"Modern",dupe:"Fakhar"},
{name:"Hawas Rasasi",occasion:"gym",budget:"mid",vibe:"Sweet 🌊",rating:4.6,why:"Strong projection",dupe:"Invictus Aqua"},
{name:"Bentley Intense",occasion:"date",budget:"mid",vibe:"Dark 🥃",rating:4.5,why:"Luxury smell",dupe:"Spicebomb vibe"},
{name:"CK One",occasion:"gym",budget:"cheap",vibe:"Clean 💧",rating:4.2,why:"Simple",dupe:"Zara Fresh"},
{name:"D&G The One",occasion:"date",budget:"high",vibe:"Warm 🥃",rating:4.7,why:"Amazing scent",dupe:"Zara Warm"},
{name:"Versace Dylan Blue",occasion:"school",budget:"mid",vibe:"Clean 🌊",rating:4.5,why:"Versatile",dupe:"Blue Homme"}
];

let history = [];

function display(items) {
document.getElementById("result").innerHTML = items.map(i => `
<div class="card">
<h2>${i.name}</h2>
<p><strong>Rating:</strong> ⭐ ${i.rating}</p>
<p><strong>Vibe:</strong> ${i.vibe}</p>
<p>${i.why}</p>
<p><strong>Dupe:</strong> ${i.dupe}</p>
</div>
`).join('');
}

function findCologne() {
const occ = document.getElementById("occasion").value;
const bud = document.getElementById("budget").value;
const vibe = document.getElementById("vibe").value;

let filtered = data;

if (occ) filtered = filtered.filter(c => c.occasion === occ);
if (bud) filtered = filtered.filter(c => c.budget === bud);
if (vibe) filtered = filtered.filter(c => c.vibe.includes(vibe));

if (filtered.length === 0) {
document.getElementById("result").innerHTML = `<div class="card">No matches yet 👀</div>`;
return;
}

const random = filtered[Math.floor(Math.random() * filtered.length)];
history.unshift(random);
updateHistory();

display([random]);
}

function searchCologne() {
const input = document.getElementById("search").value.toLowerCase();
const results = data.filter(c => c.name.toLowerCase().includes(input));
display(results);
}

function updateHistory() {
document.getElementById("history").innerHTML = history.slice(0,5).map(h => `
<div class="card">
<h4>${h.name}</h4>
<p>⭐ ${h.rating}</p>
</div>
`).join('');
}

function loadTop() {
const sorted = [...data].sort((a,b) => b.rating - a.rating).slice(0,3);
document.getElementById("top").innerHTML = sorted.map(t => `
<div class="card">
<h3>${t.name}</h3>
<p>⭐ ${t.rating}</p>
</div>
`).join('');
}

loadTop();
</script>

</body>
</html>
