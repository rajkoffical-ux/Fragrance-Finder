<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScentMatch</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0d0d12;
    color: white;
}

.header {
    text-align: center;
    padding: 40px 20px;
}

h1 {
    font-size: 3rem;
}

.sub {
    color: #aaa;
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 20px;
}

select, button {
    width: 100%;
    padding: 14px;
    margin-top: 12px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
}

select {
    background: #1a1a22;
    color: white;
}

button {
    background: linear-gradient(135deg, #00f0ff, #ff00aa);
    color: black;
    font-weight: bold;
    cursor: pointer;
}

.card {
    background: #16161f;
    margin-top: 20px;
    padding: 20px;
    border-radius: 15px;
}

.section-title {
    margin-top: 40px;
    font-weight: bold;
    color: #00f0ff;
}
</style>
</head>

<body>

<div class="header">
<h1>ScentMatch 💨</h1>
<p class="sub">Find a scent that actually fits your vibe</p>
</div>

<div class="container">

<select id="occasion">
<option value="">Where are you going?</option>
<option value="school">School</option>
<option value="gym">Gym</option>
<option value="date">Date</option>
<option value="Fresh">Fresh</option>
<option value="Sweet">Sweet</option>
<option value="Dark">Dark</option>
<option value="Clean">Clean</option>
</select>

<button onclick="clearHistory()">Clear History</button>
</select>

<select id="budget">
<option value="">Budget?</option>
<option value="cheap">Under $50</option>
<option value="mid">$50–$100</option>
<option value="high">$100+</option>
</select>

<button onclick="findCologne()">Find My Scent</button>

<div id="result"></div>

<div class="section-title">🔥 Top Picks</div>
<div id="topPicks"></div>

<div class="section-title">🕒 Recently Generated</div>
<div id="history"></div>

</div>

<script>
const data = [
{name:"Acqua di Gio Profumo",occasion:"school",budget:"high",vibe:"Fresh 🌊",why:"Clean and masculine",dupe:"Armaf Tres Nuit"},
{name:"Jean Paul Gaultier Le Male",occasion:"date",budget:"mid",vibe:"Sweet 🍬",why:"Classic compliment getter",dupe:"Cuba Gold"},
{name:"Spicebomb Extreme",occasion:"date",budget:"high",vibe:"Warm 🔥",why:"Strong winter scent",dupe:"Cremo Spice & Black Vanilla"},
{name:"Tom Ford Noir Extreme",occasion:"date",budget:"high",vibe:"Dark 🥃",why:"Luxury vibe",dupe:"Maison Alhambra Noir"},
{name:"Davidoff Cool Water Intense",occasion:"gym",budget:"cheap",vibe:"Fresh 💧",why:"Strong aquatic scent",dupe:"Nautica Blue"},
{name:"Paco Rabanne 1 Million",occasion:"date",budget:"mid",vibe:"Sweet 🔥",why:"Very popular club scent",dupe:"Club de Nuit Urban Man"},
{name:"Versace Dylan Blue",occasion:"school",budget:"mid",vibe:"Clean 🌍",why:"Very versatile",dupe:"Armaf Blue Homme"},
{name:"Bvlgari Man in Black",occasion:"date",budget:"high",vibe:"Dark 🥃",why:"Spicy and bold",dupe:"Bentley Intense"},
{name:"YSL La Nuit de L'Homme",occasion:"date",budget:"high",vibe:"Smooth 🌙",why:"Perfect date scent",dupe:"Guess Seductive Homme"},
{name:"Abercrombie Fierce",occasion:"school",budget:"mid",vibe:"Clean 🍃",why:"Mall classic scent",dupe:"Montblanc Legend"},
{name:"Montblanc Legend Spirit",occasion:"gym",budget:"mid",vibe:"Fresh 💧",why:"Light and sporty",dupe:"Invictus Aqua"},
{name:"Issey Miyake L'eau d'Issey",occasion:"school",budget:"mid",vibe:"Fresh 🌊",why:"Unique watery scent",dupe:"Armaf Tres Nuit"},
{name:"Chanel Allure Homme Sport",occasion:"gym",budget:"high",vibe:"Sporty 🏃",why:"Fresh and classy",dupe:"Missoni Wave"},
{name:"Hugo Boss Bottled",occasion:"school",budget:"mid",vibe:"Warm 🍎",why:"Everyday safe scent",dupe:"Zara Warm Black"},
{name:"Azzaro Wanted",occasion:"date",budget:"mid",vibe:"Sweet 🔥",why:"Party scent",dupe:"Guess Seductive"},
{name:"Burberry Touch",occasion:"school",budget:"cheap",vibe:"Clean 🍃",why:"Simple and fresh",dupe:"CK One"},
{name:"CK Eternity",occasion:"school",budget:"cheap",vibe:"Fresh 🌿",why:"Classic daily scent",dupe:"Zara Fresh"},
{name:"Armani Code",occasion:"date",budget:"high",vibe:"Dark 🌙",why:"Elegant night scent",dupe:"Jaguar Classic Black"},
{name:"Lattafa Asad",occasion:"date",budget:"cheap",vibe:"Dark 🔥",why:"Strong and spicy",dupe:"Dior Sauvage Elixir"},
{name:"Maison Alhambra Kismet Angel",occasion:"date",budget:"cheap",vibe:"Sweet 🍯",why:"Luxury smell cheap",dupe:"Angels Share"},
{name:"Rasasi Daarej",occasion:"date",budget:"cheap",vibe:"Warm 🔥",why:"Underrated gem",dupe:"Valentino Uomo"},
{name:"Ferrari Black",occasion:"date",budget:"cheap",vibe:"Dark 🖤",why:"Budget night scent",dupe:"Armani Code"},
{name:"Zara Seoul",occasion:"school",budget:"cheap",vibe:"Fresh 🌊",why:"Cheap daily wear",dupe:"Versace Pour Homme"},
{name:"Versace Pour Homme",occasion:"school",budget:"mid",vibe:"Clean 🌊",why:"Very fresh",dupe:"Zara Seoul"},
{name:"Coach for Men",occasion:"school",budget:"mid",vibe:"Fresh 🍃",why:"Modern clean scent",dupe:"Montblanc Explorer"},
{name:"Prada Luna Rossa Carbon",occasion:"school",budget:"high",vibe:"Clean ⚡",why:"Smooth and modern",dupe:"Dior Sauvage"},
{name:"Dolce & Gabbana Light Blue",occasion:"gym",budget:"mid",vibe:"Fresh 🍋",why:"Summer scent",dupe:"Nautica Voyage"},
{name:"D&G The One",occasion:"date",budget:"high",vibe:"Warm 🥃",why:"Amazing smell",dupe:"Zara Rich Warm Addictive"},
{name:"Zara Rich Warm Addictive",occasion:"date",budget:"cheap",vibe:"Sweet 🍯",why:"Cheap and good",dupe:"D&G The One"},
{name:"Givenchy Gentleman",occasion:"date",budget:"high",vibe:"Smooth 🧥",why:"Classy scent",dupe:"Bentley Absolute"}
];

let history = [];

function findCologne() {
const occ = document.getElementById("occasion").value;
const bud = document.getElementById("budget").value;

if (!occ || !bud) {
document.getElementById("result").innerHTML = `<div class="card">Pick both options first 👀</div>`;
return;
}

const matches = data.filter(c => c.occasion === occ && c.budget === bud);

if (matches.length > 0) {
const random = matches[Math.floor(Math.random() * matches.length)];

history.unshift(random);
updateHistory();

document.getElementById("result").innerHTML = `
<div class="card">
<h2>${random.name}</h2>
<p><strong>Vibe:</strong> ${random.vibe}</p>
<p><strong>Why:</strong> ${random.why}</p>
<p><strong>Dupe:</strong> ${random.dupe}</p>
</div>`;
} else {
document.getElementById("result").innerHTML = `<div class="card">More coming soon 👀</div>`;
}
}

function loadTopPicks() {
const picks = data.slice(0,4);
document.getElementById("topPicks").innerHTML = picks.map(p => `
<div class="card">
<h3>${p.name}</h3>
<p>${p.vibe}</p>
</div>`).join('');
}

function updateHistory() {
document.getElementById("history").innerHTML = history.slice(0,5).map(h => `
<div class="card">
<h4>${h.name}</h4>
<p>${h.vibe}</p>
</div>`).join('');
}

loadTopPicks();
</script>

</body>
</html>
