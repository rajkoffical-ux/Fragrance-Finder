let history = [];

function display(items) {
document.getElementById("result").innerHTML = items.map(i => `
<div class="card">
<img src="${i.image}" style="width:100%">
<h3>${i.name}</h3>
<p>⭐ ${i.rating}</p>
<p>${i.vibe}</p>
<p>${i.why}</p>
</div>
`).join('');
}

function findCologne() {
let filtered = data;

const occ = document.getElementById("occasion").value;
const bud = document.getElementById("budget").value;
const vibe = document.getElementById("vibe").value;

if (occ) filtered = filtered.filter(c => c.occasion === occ);
if (bud) filtered = filtered.filter(c => c.budget === bud);
if (vibe) filtered = filtered.filter(c => c.vibe === vibe);

if (filtered.length === 0) return;

const pick = filtered[Math.floor(Math.random()*filtered.length)];
history.unshift(pick);

display([pick]);
updateHistory();
}

function searchCologne() {
const val = document.getElementById("search").value.toLowerCase();
const res = data.filter(c => c.name.toLowerCase().includes(val));
display(res);
}

function updateHistory() {
document.getElementById("history").innerHTML = history.slice(0,5).map(h => `
<div class="card">${h.name}</div>
`).join('');
}

function loadTop() {
const top = [...data].sort((a,b)=>b.rating-a.rating).slice(0,3);
document.getElementById("top").innerHTML = top.map(t => `
<div class="card">${t.name} ⭐${t.rating}</div>
`).join('');
}

loadTop();
display(data);
